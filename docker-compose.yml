version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: team-task-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: team_task_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: team-task-backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "5052:5052"
    environment:
      PORT: 5052
      JWT_SECRET: supersecretkey
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/team_task_portal?schema=public
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: team-task-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  postgres_data:
